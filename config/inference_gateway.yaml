# Inference Gateway Configuration
#
# Defines LLM endpoints and the fallback chain for each module's inference needs.
# Per DD-002, the Cognitive Core and World Model MUST use different models.
# Per DD-018, modules specify capability level needed; gateway routes to best available.
#
# Updated Phase 4b: all providers now use Ollama cloud models.
#   cognitive-core    → glm-5.1:cloud (frontier reasoning)
#   world-model       → minimax-m2.7:cloud (different LLM than Cognitive Core)
#   thalamus-classifier → kimi-k2.5:cloud (lightweight, long-context)
#   checkpost         → kimi-k2.5:cloud (entity recognition)
#   queue-zone        → kimi-k2.5:cloud (priority + relevance)
#   tlp               → glm-5.1:cloud (context assembly, significance)
#   consolidation      → kimi-k2.5:cloud (memory consolidation, cheap)

models:
  # === Cognitive Core (frontier reasoning) ===
  cognitive-core:
    primary:
      provider: "ollama"
      model: "glm-5.1:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.7
    fallback:
      - provider: "ollama"
        model: "minimax-m2.7:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 2048
        temperature: 0.7

  # === World Model (different LLM than Cognitive Core) ===
  world-model:
    primary:
      provider: "ollama"
      model: "minimax-m2.7:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.3
    fallback:
      - provider: "ollama"
        model: "kimi-k2.5:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 1024
        temperature: 0.3

  # === Thalamus Layer 2 Classifier (lightweight, frequent) ===
  thalamus-classifier:
    primary:
      provider: "ollama"
      model: "kimi-k2.5:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 512
      temperature: 0.2
    fallback:
      - provider: "ollama"
        model: "glm-5.1:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 512
        temperature: 0.2

  # === Checkpost (entity recognition, intent classification) ===
  checkpost:
    primary:
      provider: "ollama"
      model: "kimi-k2.5:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 1024
      temperature: 0.3
    fallback:
      - provider: "ollama"
        model: "glm-5.1:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 1024
        temperature: 0.3

  # === Queue Zone assessment (priority + relevance) ===
  queue-zone:
    primary:
      provider: "ollama"
      model: "kimi-k2.5:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 512
      temperature: 0.2
    fallback:
      - provider: "ollama"
        model: "glm-5.1:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 512
        temperature: 0.2

  # === Temporal-Limbic-Processor (context assembly, significance) ===
  tlp:
    primary:
      provider: "ollama"
      model: "glm-5.1:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.4
    fallback:
      - provider: "ollama"
        model: "minimax-m2.7:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 2048
        temperature: 0.4

  # === Memory consolidation during sleep ===
  consolidation:
    primary:
      provider: "ollama"
      model: "kimi-k2.5:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 1024
      temperature: 0.3
    fallback:
      - provider: "ollama"
        model: "glm-5.1:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 1024
        temperature: 0.3

  # === Semantic extraction during sleep (large context) ===
  consolidation-semantic:
    primary:
      provider: "ollama"
      model: "kimi-k2.5:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.3
    fallback:
      - provider: "ollama"
        model: "glm-5.1:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 2048
        temperature: 0.3

  # === Procedural extraction during sleep (deep reasoning) ===
  consolidation-procedural:
    primary:
      provider: "ollama"
      model: "glm-5.1:cloud"
      base_url: "http://localhost:11434"
      max_tokens: 2048
      temperature: 0.3
    fallback:
      - provider: "ollama"
        model: "minimax-m2.7:cloud"
        base_url: "http://localhost:11434"
        max_tokens: 2048
        temperature: 0.3

# Routing behavior
routing:
  # If primary fails, try fallback chain in order
  fallback_on_error: true
  # If primary times out after this, treat as failure and fall back
  timeout_seconds: 60
  # Track per-endpoint performance for adaptive routing
  performance_tracking:
    enabled: true
    window_size_calls: 100
    # If primary's success rate drops below this, prefer fallback
    health_threshold: 0.7

# Cost tracking (estimated)
cost_tracking:
  enabled: true
  log_path: "./data/logs/cost.log"
  # Alert if monthly cost exceeds this
  monthly_alert_usd: 200