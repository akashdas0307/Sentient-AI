# System configuration for Sentient AI Framework
# Phase 9: Daydream Seed Engine

system:
  data_dir: ./data
  log_level: INFO

health:
  pulse_interval_seconds: 30
  anomaly_threshold: 0.8

memory:
  storage:
    sqlite_path: ./data/memory.db
    chroma_path: ./data/chroma
  embeddings:
    model: all-MiniLM-L6-v2
  retrieval:
    default_max_results: 15
  gatekeeper:
    importance_threshold: 0.3
    novelty_bonus: 0.1

persona:
  config_dir: ./config/identity

thalamus:
  batch_processing:
    enabled: true
  plugins:
    - chat_input

cognitive_core:
  episodic_memory_enabled: true
  semantic_enabled: true
  procedural_enabled: true
  daydream:
    enabled: true
    idle_seconds_before_trigger: 90
    max_daydream_duration_seconds: 180
    seed_sources_enabled: true
    curiosity_queue_max_size: 20
    emotional_residue_window_minutes: 30

world_model:
  model_label: world-model
  max_revisions: 2
  revision_esc:
    approve_with_flag: true
    fallback_veto: false

decision_arbiter:
  revise_request_ttl_seconds: 300
  veto_esc:
    approve_with_flag: true
    fallback_veto: false

checkpost:
  entity_recognition:
    enabled: true

tlp:
  context_window: 10

queue_zone:
  starvation:
    age_to_tier2_seconds: 300

brainstem:
  plugins:
    - chat_output

harness:
  harness: claude_code
  command:
    - claude
    - --print

sleep:
  consolidation:
    enabled: true
    schedule: daily
    max_duration_seconds: 300
  contradiction_resolution:
    enabled: true
    max_pairs_per_cycle: 10
    similarity_threshold: 0.3
    llm_timeout_seconds: 30
  wm_calibration:
    enabled: true
    max_adjustment_per_cycle: 0.05
  procedural_refinement:
    enabled: true
    reinforcement_threshold: 5
    stale_days: 30
    archive_threshold: 0.1
    confidence_bump: 0.02
    confidence_decay: 0.01
  identity_drift:
    enabled: true
    drift_threshold: 0.3
    drift_window_days: 7

api:
  host: 0.0.0.0
  port: 8765
  cors_enabled: true
